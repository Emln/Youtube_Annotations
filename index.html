<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Annotater</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div
      class="container-fluid d-flex flex-column justify-content-center vh-100 w-75"
    >
      <div class="row text-center">
        <h1>YouTube Annotater</h1>
      </div>
      <div class="row mt-5">
        <div id="ytplayer" class="col-8"></div>
        <div id="sidebar-annotations" class="col-4 mt-3"></div>
      </div>
      <div class="row mt-4">
        <p id="current-time" class="text-center">Timecode: 00:00</p>
        <textarea
          id="annotation-input"
          class="form-control mt-3"
          placeholder="Enter annotation text here..."
        ></textarea>
        <button type="button" id="get-time" class="btn btn-primary btn-lg mt-3">
          Make Annotation
        </button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
